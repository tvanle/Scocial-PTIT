name: ptit-social

services:
  # Main API Server
  api:
    container_name: ptit-social-api
    build: .
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ptit_social?schema=public
      - REDIS_URL=redis://redis:6379
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_INTERNAL_URL=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - ptit-network

  # PostgreSQL
  postgres:
    container_name: ptit-social-postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ptit_social
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - ptit-network

  # MinIO (S3-compatible object storage)
  minio:
    container_name: ptit-social-minio
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ptit-network

  # Redis
  redis:
    container_name: ptit-social-redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6381:6379"
    networks:
      - ptit-network

networks:
  ptit-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
